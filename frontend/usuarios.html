<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' https://cdn.jsdelivr.net; connect-src 'self' http://localhost:3000;" />
  <title>Usuarios - Bibliotecario</title>
  <script>
    if (!localStorage.getItem('token')) window.location.href = '/frontend/login.html';
  </script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="css/common.css" rel="stylesheet" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="home.html">Biblio<em>tecario</em></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link" href="home.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="livros.html">Livros</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="autores.html">Autores</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="usuarios.html">Usuarios</a>
          </li>
        </ul>
        <div class="d-flex align-items-center gap-3">
          <span id="user-name" class="text-white"></span>
          <button id="btn-logout" class="btn btn-sm btn-outline-light">Sair</button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main -->
  <main>
    <!-- Lista -->
    <section id="usuarios-lista" aria-labelledby="titulo-usuarios">
      <h2 class="section-title" id="titulo-usuarios">Usuarios Cadastrados</h2>
      <div class="card-custom">
        <div class="table-responsive">
          <table class="table table-bordered table-hover mb-0">
            <thead>
              <tr><th>#</th><th>Nome</th><th>E-mail</th><th>Acoes</th></tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- Formulario -->
    <section id="cadastro-usuario" aria-labelledby="titulo-form-usuario">
      <h2 class="section-title" id="titulo-form-usuario">Cadastrar / Editar Usuario</h2>
      <div class="card-custom">
        <form id="form-usuario" novalidate>
          <input type="hidden" id="usuario-id" name="id" value="" />
          <div class="row g-3">
            <div class="col-12 col-md-6">
              <label for="usuario-nome">Nome <span class="text-danger">*</span></label>
              <input type="text" id="usuario-nome" name="nome" class="form-control"
                placeholder="Ex: Joao da Silva" required />
            </div>
            <div class="col-12 col-md-6">
              <label for="usuario-email">E-mail <span class="text-danger">*</span></label>
              <input type="email" id="usuario-email" name="email" class="form-control"
                placeholder="Ex: joao@email.com" required />
            </div>
            <div class="col-12">
              <label for="usuario-senha">Senha <span class="text-danger">*</span></label>
              <input type="password" id="usuario-senha" name="senha" class="form-control"
                placeholder="Minimo 6 caracteres" minlength="6" />
            </div>
          </div>
          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn-salvar">Salvar</button>
            <button type="reset" class="btn-limpar">Limpar</button>
          </div>
        </form>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 <strong>Bibliotecario</strong> &mdash; Projeto Final Fullstack</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>const API_BASE = 'http://localhost:3000/api';</script>
  <script src="js/auth.js"></script>
  <script src="js/usuarios.js"></script>

</body>
</html>
