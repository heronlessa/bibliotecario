<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' https://cdn.jsdelivr.net; connect-src 'self' http://localhost:3000;" />
  <title>Emprestimos - Bibliotecario</title>
  <script>
    if (!localStorage.getItem('token')) window.location.href = '/frontend/login.html';
  </script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="css/common.css" rel="stylesheet" />
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="home.html">Biblio<em>tecario</em></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link" href="home.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="livros.html">Livros</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="autores.html">Autores</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="usuarios.html">Usuarios</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="emprestimos.html">Emprestimos</a>
          </li>
        </ul>
        <div class="d-flex align-items-center gap-3">
          <span id="user-name" class="text-white"></span>
          <button id="btn-logout" class="btn btn-sm btn-outline-light">Sair</button>
        </div>
      </div>
    </div>
  </nav>

  <main>
    <section id="lista" aria-labelledby="titulo-lista">
      <h2 class="section-title" id="titulo-lista">Emprestimos Cadastrados</h2>
      <div class="card-custom">
        <div class="table-responsive">
          <table class="table table-bordered table-hover mb-0">
            <thead>
              <tr>
                <th>#</th>
                <th>Livro</th>
                <th>Usuario</th>
                <th>Data Saida</th>
                <th>Data Prevista</th>
                <th>Data Devolucao</th>
                <th>Status</th>
                <th>Acoes</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </section>

    <section id="cadastro" aria-labelledby="titulo-form">
      <h2 class="section-title" id="titulo-form">Cadastrar / Editar Emprestimo</h2>
      <div class="card-custom">
        <form id="form-emprestimo" novalidate>
          <input type="hidden" id="emprestimo-id" name="id" value="" />
          <div class="row g-3">
            <div class="col-12 col-md-6">
              <label for="livro-id">Livro <span class="text-danger">*</span></label>
              <select id="livro-id" name="livro_id" class="form-select" required>
                <option value="" disabled selected>Selecione</option>
              </select>
            </div>
            <div class="col-12 col-md-6">
              <label for="usuario-id">Usuario <span class="text-danger">*</span></label>
              <select id="usuario-id" name="usuario_id" class="form-select" required>
                <option value="" disabled selected>Selecione</option>
              </select>
            </div>
            <div class="col-12 col-md-6">
              <label for="data-saida">Data de Saida <span class="text-danger">*</span></label>
              <input type="date" id="data-saida" name="data_saida" class="form-control" required />
            </div>
            <div class="col-12 col-md-6">
              <label for="data-prevista">Data Prevista de Devolucao <span class="text-danger">*</span></label>
              <input type="date" id="data-prevista" name="data_prevista" class="form-control" required />
            </div>
          </div>
          <div class="mt-4 d-flex gap-2 flex-wrap">
            <button type="submit" class="btn-salvar">Salvar</button>
            <button type="reset" class="btn-limpar">Limpar</button>
          </div>
        </form>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 <strong>Bibliotecario</strong> &mdash; Projeto Final Fullstack</p>
  </footer>

  <script>const API_BASE = 'http://localhost:3000/api';</script>
  <script src="js/auth.js"></script>
  <script src="js/emprestimos.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
