<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — Bibliotecario</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    :root {
      --primaria:  #2d6a4f;
      --secundaria:#40916c;
      --escura:    #1b1b2f;
      --fundo:     #f0f4f1;
      --card:      #ffffff;
      --texto:     #2c2c2c;
      --borda:     #d8e8df;
      --fonte:     'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      font-family: var(--fonte);
      background: var(--fundo);
      color: var(--texto);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: var(--escura);
      color: #fff;
      padding: 0.9rem 2rem;
    }
    .logo { font-size: 1.45rem; font-weight: 700; }
    .logo em { color: #74c69d; font-style: normal; }
    .subtitulo { font-size: 0.75rem; color: #888; }
    main {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2.5rem 1.5rem;
    }
    .auth-box { width: 100%; max-width: 420px; }
    .auth-box h1 { font-size: 1.35rem; font-weight: 700; color: var(--escura); text-align: center; }
    .auth-box p { text-align: center; color: #666; font-size: 0.9rem; }
    .card-custom {
      background: var(--card);
      border: 1px solid var(--borda);
      border-radius: 8px;
      padding: 1.6rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    label { font-weight: 600; font-size: 0.87rem; }
    .form-control:focus {
      border-color: var(--secundaria);
      box-shadow: 0 0 0 0.2rem rgba(64,145,108,0.2);
    }
    .form-control.is-invalid { border-color: #dc3545; }
    .btn-salvar {
      background: var(--primaria);
      color: #fff;
      border: none;
      padding: 0.6rem 2rem;
      border-radius: 6px;
      font-weight: 700;
      width: 100%;
      cursor: pointer;
    }
    .btn-salvar:hover { background: #1b4332; }
    .auth-dica {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      background: #eaf4ef;
      border-radius: 6px;
      font-size: 0.82rem;
      color: #2d6a4f;
      border-left: 3px solid var(--primaria);
    }
    footer {
      background: var(--escura);
      color: #888;
      text-align: center;
      padding: 0.85rem;
      font-size: 0.79rem;
    }
    footer strong { color: #74c69d; }
  </style>
</head>
<body>

  <header>
    <div class="logo">Biblio<em>tecario</em></div>
    <div class="subtitulo">Sistema de Gestao de Biblioteca</div>
  </header>

  <main>
    <div class="auth-box">
      <h1 class="mb-1">Bem-vindo</h1>
      <p class="mb-4">Acesse sua conta para gerenciar a biblioteca</p>
      <div class="card-custom">
        <form id="form-login" novalidate>
          <div class="mb-3">
            <label for="login-email">E-mail <span class="text-danger">*</span></label>
            <input type="email" id="login-email" class="form-control" placeholder="seu@email.com" autocomplete="email" required />
          </div>
          <div class="mb-4">
            <label for="login-senha">Senha <span class="text-danger">*</span></label>
            <input type="password" id="login-senha" class="form-control" placeholder="Sua senha" autocomplete="current-password" required />
          </div>
          <button type="submit" class="btn-salvar">Entrar</button>
        </form>
        <div class="auth-dica">
          <strong>Conta de teste</strong>
          E-mail: admin@biblioteca.com — Senha: admin123
        </div>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 <strong>Bibliotecario</strong> &mdash; Projeto Final Fullstack</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth-page.js"></script>

</body>
</html>
